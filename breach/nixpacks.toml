[phases.build]
nixPkgs = ['nodejs', 'python311', 'python311Packages.pip']
cmds = [
  'pip install -r backend/requirements.txt',
  'cd frontend && npm ci && npm run build'
]

[phases.setup]
nixPkgs = ['nodejs', 'python311']

[staticAssets]
# Serve frontend/dist
from = 'frontend/dist'
to = '/var/www/html'
